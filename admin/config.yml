backend:
  name: github
  repo: Lordshrrred/VibrationofAwesome      # your exact repo name (case-sensitive)
  branch: main                               # your branch
  auth_type: pkce                            # secure modern flow (recommended)
  app_id: ""                                 # leave blank for implicit/PKCE
  base_url: https://vibrationofawesome.com   # your live domain
  auth_endpoint: https://github.com/login/oauth/authorize

media_folder: "images/uploads"   # folder for uploaded images
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "blog"  # create this folder in root later if needed
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Tags", name: "tags", widget: "list"}

  - name: "pages"
    label: "Pages"
    folder: "pages"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}