name: Netlify Functions (disabled - Netlify deploys via dashboard integration)
# This workflow is intentionally disabled.
# Netlify auto-deploys from the GitHub repo via its own dashboard webhook,
# keeping vibrationofawesome.netlify.app alive for the AURA serverless function.
# The primary site (vibrationofawesome.com) is now served by GitHub Pages.

on:
  workflow_dispatch: # manual trigger only — no longer fires on push

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './public'
          production-branch: main
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
