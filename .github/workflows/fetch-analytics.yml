name: Fetch Analytics

on:
  schedule:
    - cron: '15 6 * * *'   # 6:15 UTC daily (~midnight MDT)
  workflow_dispatch:        # manual trigger from dashboard

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth python-dotenv

      - name: Fetch GA4 data
        env:
          GA_CREDENTIALS_JSON: ${{ secrets.GA_CREDENTIALS_JSON }}
          GA_PROPERTY_ID:      ${{ secrets.GA_PROPERTY_ID }}
        run: python scripts/fetch_analytics.py

      - name: Commit analytics.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/analytics.json
          if git diff --cached --quiet; then
            echo "No changes to analytics.json"
          else
            git commit -m "chore: update analytics.json [skip ci]"
            git push
          fi
