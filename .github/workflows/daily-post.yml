name: Daily Post and Syndication

on:
  schedule:
    - cron: '0 9 * * *'    # 09:00 UTC (03:00 Denver, MDT) — generate general post
    - cron: '30 9 * * *'   # 09:30 UTC (03:30 Denver, MDT) — generate local/city post
    - cron: '30 10 * * *'  # 10:30 UTC (04:30 Denver, MDT) — syndicate general post
    - cron: '30 12 * * *'  # 12:30 UTC (06:30 Denver, MDT) — syndicate local post
    - cron: '30 14 * * *'  # 14:30 UTC (08:30 Denver, MDT) — syndicate 1 backlog post
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'generate-general'
        type: choice
        options:
          - generate-general
          - generate-local
          - syndicate-new-1
          - syndicate-new-2
          - syndicate-backlog

permissions:
  contents: write
  actions: write

env:
  TZ: America/Denver

# ────────────────────────────────────────────────────────────────────────────────
# SHARED STEPS (reused via anchors where possible)
# ────────────────────────────────────────────────────────────────────────────────

jobs:

  # ── JOB 1: Generate general post (9:00am UTC) ─────────────────────────────────
  generate-general:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 9 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'generate-general')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic python-dotenv requests requests-oauthlib

      - name: Generate general post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/generate_post.py --type general

      - name: Verify post was created
        run: |
          if [ ! -f scripts/last_general_slug.txt ]; then
            echo "::error::generate_post.py did not write scripts/last_general_slug.txt"
            exit 1
          fi
          SLUG=$(cat scripts/last_general_slug.txt)
          echo "Generated slug: $SLUG"
          if [ ! -f "content/posts/${SLUG}.md" ]; then
            echo "::error::Expected post file not found: content/posts/${SLUG}.md"
            exit 1
          fi
          echo "Post verified: content/posts/${SLUG}.md ($(wc -l < content/posts/${SLUG}.md) lines)"

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - run: hugo --minify

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit general post
        run: |
          SLUG=$(cat scripts/last_general_slug.txt)
          echo "Staging files for slug: $SLUG"
          git add "content/posts/${SLUG}.md"
          git add "static/images/${SLUG}/" 2>/dev/null || echo "No images dir for $SLUG — skipping"
          git add scripts/keywords.txt scripts/last_general_slug.txt scripts/last_generated_slug.txt || true
          echo "Staged changes:"
          git diff --staged --name-only
          if git diff --staged --quiet; then
            echo "::error::Nothing staged after git add — post may already be committed or file was not saved"
            exit 1
          fi
          git commit -m "Auto: general post $(date +%Y-%m-%d)"
          git push
          echo "Committed and pushed: $(git rev-parse HEAD)"

      - name: Trigger site deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering hugo.yml deploy (GITHUB_TOKEN push does not auto-trigger on:push workflows)..."
          HTTP_STATUS=$(curl -s -o /tmp/dispatch_response.txt -w "%{http_code}" -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/hugo.yml/dispatches" \
            -d '{"ref":"main"}')
          echo "Dispatch HTTP status: $HTTP_STATUS"
          cat /tmp/dispatch_response.txt || true
          if [ "$HTTP_STATUS" != "204" ]; then
            echo "::warning::Deploy dispatch returned $HTTP_STATUS — site may not redeploy automatically"
          else
            echo "Deploy triggered successfully"
          fi

      - name: Feeder generation handled during syndication
        run: |
          echo "Skipping separate feeder trigger here."
          echo "The syndication job owns feeder publishing so the source post maps to one support URL."

  # ── JOB 2: Generate local/city post (9:30am UTC) ──────────────────────────────
  generate-local:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 9 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'generate-local')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic python-dotenv requests requests-oauthlib

      - name: Generate local post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/generate_post.py --type local

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - run: hugo --minify

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit local post
        run: |
          git add content/posts/ static/images/ scripts/keywords.txt \
                  scripts/last_local_slug.txt scripts/last_generated_slug.txt || true
          git diff --staged --quiet || git commit -m "Auto: local post $(date +%Y-%m-%d)"
          git push

  # ── JOB 3: Syndicate general post (10:30am UTC) ───────────────────────────────
  syndicate-new-1:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 10 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'syndicate-new-1')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic python-dotenv requests requests-oauthlib

      - name: Syndicate general post
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_TOKEN: ${{ secrets.TUMBLR_TOKEN }}
          TUMBLR_TOKEN_SECRET: ${{ secrets.TUMBLR_TOKEN_SECRET }}
          TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEEDER_TRIGGER_TOKEN: ${{ secrets.FEEDER_TRIGGER_TOKEN }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          SLUG=$(cat scripts/last_general_slug.txt 2>/dev/null || echo "")
          if [ -z "$SLUG" ]; then
            echo "No last_general_slug.txt found — skipping syndication"
            exit 0
          fi
          echo "Syndicating general post: $SLUG"
          python scripts/syndicate_post.py "$SLUG"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit syndication log
        run: |
          git add scripts/synced-posts.txt scripts/syndication_log.txt || true
          git diff --staged --quiet || git commit -m "Auto: syndicate general post $(date +%Y-%m-%d)"
          git push

  # ── JOB 4: Syndicate local post (12:30pm UTC) ─────────────────────────────────
  syndicate-new-2:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 12 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'syndicate-new-2')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic python-dotenv requests requests-oauthlib

      - name: Syndicate local post
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_TOKEN: ${{ secrets.TUMBLR_TOKEN }}
          TUMBLR_TOKEN_SECRET: ${{ secrets.TUMBLR_TOKEN_SECRET }}
          TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEEDER_TRIGGER_TOKEN: ${{ secrets.FEEDER_TRIGGER_TOKEN }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          SLUG=$(cat scripts/last_local_slug.txt 2>/dev/null || echo "")
          if [ -z "$SLUG" ]; then
            echo "No last_local_slug.txt found — skipping syndication"
            exit 0
          fi
          echo "Syndicating local post: $SLUG"
          python scripts/syndicate_post.py "$SLUG"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit syndication log
        run: |
          git add scripts/synced-posts.txt scripts/syndication_log.txt || true
          git diff --staged --quiet || git commit -m "Auto: syndicate local post $(date +%Y-%m-%d)"
          git push

  # ── JOB 5: Syndicate backlog post (2:30pm UTC) ────────────────────────────────
  syndicate-backlog:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 14 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'syndicate-backlog')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic python-dotenv requests requests-oauthlib

      - name: Syndicate backlog post (oldest unsynced)
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_TOKEN: ${{ secrets.TUMBLR_TOKEN }}
          TUMBLR_TOKEN_SECRET: ${{ secrets.TUMBLR_TOKEN_SECRET }}
          TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEEDER_TRIGGER_TOKEN: ${{ secrets.FEEDER_TRIGGER_TOKEN }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/syndicate_backlog.py

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit syndication results
        run: |
          git add scripts/synced-posts.txt scripts/syndication_log.txt || true
          git diff --staged --quiet || git commit -m "Auto: backlog syndication $(date +%Y-%m-%d)"
          git push
