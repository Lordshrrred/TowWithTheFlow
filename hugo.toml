baseURL = "https://towwiththeflow.com/"
languageCode = "en-us"
title = "Tow With The Flow"
theme = "twtf"
enableRobotsTXT = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  description = "Real help when your car breaks down."
  tagline = "Real Answers When Your Car Breaks Down"
  subtagline = "No fluff. No runaround. Just what to do next."
  googleAnalytics = "" # Paste GA_MEASUREMENT_ID here to activate

[permalinks]
  posts = "/:slug/"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
