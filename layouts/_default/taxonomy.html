{{ define "head-extra" }}
<style>
  .taxonomy-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 10rem 4rem 8rem;
    position: relative;
    z-index: 1;
  }
  .taxonomy-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    color: var(--cream);
    margin-bottom: 3rem;
  }
  .taxonomy-tag {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 1rem;
    display: block;
  }
  .term-list { list-style: none; display: flex; flex-wrap: wrap; gap: 1rem; }
  .term-list li a {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid rgba(0,229,204,0.15);
    padding: 0.5rem 1.25rem;
    text-decoration: none;
    transition: all 0.2s;
  }
  .term-list li a:hover { color: var(--gold); border-color: rgba(0,229,204,0.4); }
</style>
{{ end }}

{{ define "main" }}
<div class="taxonomy-wrap">
  <span class="taxonomy-tag">{{ .Type }}</span>
  <h1 class="taxonomy-title">{{ .Title }}</h1>
  <ul class="term-list">
    {{ range .Data.Terms.Alphabetical }}
    <li><a href="{{ .Page.RelPermalink }}">{{ .Page.Title }} ({{ .Count }})</a></li>
    {{ end }}
  </ul>
</div>
{{ end }}
